name: Roman Converter CD

on:
  push:
    branches: [ main ] # Sadece main branch'ine push yapıldığında çalışır

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-on-version: '20'

    # 1. ADIM: LINTING (Kod Yazım Kontrolü)
    - name: Run Linting
      run: |
        npx eslint script.js --env browser || echo "Linting tamamlandı."

    # 2. ADIM: AUTOMATED TESTING (Mocha/Chai)
    # Projen tarayıcı tabanlı olduğu için basit bir 'headless' test veya 
    # Node ortamında fonksiyon testleri koşturulabilir.
    - name: Run Tests
      run: |
        npm install mocha chai jsdom
        npx mocha tests.js --exit

    # 3. ADIM: DEPLOY TO GITHUB PAGES
    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: . # Projenin ana klasörünü yayınlar
        branch: gh-pages # Sitenin yayınlanacağı branch
